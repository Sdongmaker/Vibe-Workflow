services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        API_URL: http://server:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://server:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-/media}
      MEDIA_STORAGE_DIR: ${MEDIA_STORAGE_DIR:-/app/media}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
